name: lion-launcher
version: git
summary: Ein moderner Minecraft Launcher
description: |
  Lion Launcher ist ein moderner, schneller Minecraft Launcher mit
  Unterstützung für Fabric, Quilt, Forge und NeoForge. Mod-Installation
  direkt aus CurseForge und Modrinth, Microsoft-Auth und Profilverwaltung.

grade: stable
confinement: strict
base: core22
compression: lzo

architectures:
  - build-on: amd64

apps:
  lion-launcher:
    command: bin/lion-launcher
    desktop: share/applications/lion-launcher.desktop
    environment:
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - browser-support
      - password-manager-service
      - system-observe

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1

parts:
  lion-launcher:
    plugin: nil
    source: .
    # build-snaps werden in --destructive-mode ignoriert / nicht unterstützt.
    # Rust wird stattdessen auf dem Host installiert (dtolnay/rust-toolchain in CI,
    # manuell via rustup bei lokalem Snap-Build).
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - libsoup-3.0-dev
      - pkg-config
      - curl
      - wget
      - file
      - patchelf
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libssl3
      - libglib2.0-0
      - libgdk-pixbuf-2.0-0
      - libpango-1.0-0
      - libcairo2
      - libatk1.0-0
      - libjavascriptcoregtk-4.1-0
    override-build: |
      # ── Rust / Cargo einrichten ──────────────────────────────────────────
      # Priorität 1: $HOME/.cargo/bin (GH-Actions dtolnay/rust-toolchain)
      export PATH="$HOME/.cargo/bin:/root/.cargo/bin:$PATH"

      if ! command -v cargo &>/dev/null; then
        echo "cargo nicht gefunden – installiere Rust via rustup..."
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --default-toolchain stable --no-modify-path
        export PATH="$HOME/.cargo/bin:$PATH"
        . "$HOME/.cargo/env" 2>/dev/null || true
      fi

      cargo --version

      # ── Tauri CLI ────────────────────────────────────────────────────────
      if ! cargo tauri --version &>/dev/null 2>&1; then
        cargo install tauri-cli --version "^2" --locked
      fi

      # ── Build ────────────────────────────────────────────────────────────
      export WEBKIT_DISABLE_DMABUF_RENDERER=1
      export WEBKIT_DISABLE_COMPOSITING_MODE=1
      cargo build --release --locked

      # ── Installieren ─────────────────────────────────────────────────────
      install -Dm755 target/release/Lion-Launcher \
        "$SNAPCRAFT_PART_INSTALL/bin/lion-launcher"
      install -Dm644 icons/128x128.png \
        "$SNAPCRAFT_PART_INSTALL/share/icons/hicolor/128x128/apps/lion-launcher.png"
      install -Dm644 icons/icon.png \
        "$SNAPCRAFT_PART_INSTALL/share/icons/hicolor/256x256/apps/lion-launcher.png"

      # ── Desktop-Eintrag ──────────────────────────────────────────────────
      mkdir -p "$SNAPCRAFT_PART_INSTALL/share/applications"
      cat > "$SNAPCRAFT_PART_INSTALL/share/applications/lion-launcher.desktop" \
        << 'DESKTOP_EOF'
      [Desktop Entry]
      Name=Lion Launcher
      Comment=Ein moderner Minecraft Launcher
      Exec=lion-launcher
      Icon=lion-launcher
      Type=Application
      Categories=Game;
      Keywords=minecraft;launcher;mods;
      StartupNotify=true
      DESKTOP_EOF

