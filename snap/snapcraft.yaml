name: lion-launcher
version: git
summary: Ein moderner Minecraft Launcher
description: |
  Lion Launcher ist ein moderner, schneller Minecraft Launcher mit
  Unterstützung für Fabric, Quilt, Forge und NeoForge. Mod-Installation
  direkt aus CurseForge und Modrinth, Microsoft-Auth und Profilverwaltung.

grade: stable
confinement: strict
base: core22
compression: lzo

architectures:
  - build-on: amd64

apps:
  lion-launcher:
    command: bin/lion-launcher
    desktop: share/applications/lion-launcher.desktop
    environment:
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - browser-support
      - password-manager-service
      - system-observe

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1

parts:
  lion-launcher:
    plugin: nil
    source: .
    build-snaps:
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - libsoup-3.0-dev
      - pkg-config
      - curl
      - wget
      - file
      - patchelf
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libssl3
      - libglib2.0-0
      - libgdk-pixbuf-2.0-0
      - libpango-1.0-0
      - libcairo2
      - libatk1.0-0
      - libjavascriptcoregtk-4.1-0
    override-build: |
      # Rust / Cargo einrichten
      if ! command -v cargo &>/dev/null; then
        rustup default stable
      fi
      export PATH="$HOME/.cargo/bin:$PATH"

      # Tauri CLI
      if ! cargo tauri --version &>/dev/null; then
        cargo install tauri-cli --version "^2" --locked
      fi

      # Build
      export WEBKIT_DISABLE_DMABUF_RENDERER=1
      export WEBKIT_DISABLE_COMPOSITING_MODE=1
      cargo build --release --locked

      # Installieren
      install -Dm755 target/release/Lion-Launcher "$SNAPCRAFT_PART_INSTALL/bin/lion-launcher"
      install -Dm644 icons/128x128.png "$SNAPCRAFT_PART_INSTALL/share/icons/hicolor/128x128/apps/lion-launcher.png"
      install -Dm644 icons/icon.png "$SNAPCRAFT_PART_INSTALL/share/icons/hicolor/256x256/apps/lion-launcher.png"

      # Desktop-Eintrag erzeugen
      mkdir -p "$SNAPCRAFT_PART_INSTALL/share/applications"
      cat > "$SNAPCRAFT_PART_INSTALL/share/applications/lion-launcher.desktop" << EOF
      [Desktop Entry]
      Name=Lion Launcher
      Comment=Ein moderner Minecraft Launcher
      Exec=lion-launcher
      Icon=${SNAP}/share/icons/hicolor/256x256/apps/lion-launcher.png
      Type=Application
      Categories=Game;
      Keywords=minecraft;launcher;mods;
      StartupNotify=true
      EOF

