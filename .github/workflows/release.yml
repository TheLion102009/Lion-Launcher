name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # Manuell über GitHub UI auslösbar

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Windows – NSIS Installer (.exe)  mit eingebettetem WebView2
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows NSIS Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Tauri CLI installieren
        run: cargo install tauri-cli --version "^2" --locked

      - name: Windows-Build (NSIS .exe)
        run: cargo tauri build
        env:
          # WebView2 Bootstrapper wird automatisch heruntergeladen und
          # in den Installer eingebettet (embedBootstrapper in tauri.conf.json)
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: WebView2-Bootstrapper im Installer verifizieren
        shell: pwsh
        run: |
          Write-Host "=== WebView2 Bootstrapper Verification ==="
          # Prüfe tauri.conf.json
          $conf = Get-Content "tauri.conf.json" | ConvertFrom-Json
          $mode = $conf.bundle.windows.webviewInstallMode.type
          Write-Host "WebView install mode: $mode"
          if ($mode -ne "embedBootstrapper") {
            Write-Host "ERROR: webviewInstallMode ist nicht embedBootstrapper!"
            exit 1
          }
          Write-Host "✓ embedBootstrapper konfiguriert"

          # Prüfe ob NSIS Installer existiert und groß genug ist (>1MB = WebView2 drin)
          $nsisDir = "target\release\bundle\nsis"
          $exeFiles = Get-ChildItem -Path $nsisDir -Filter "*.exe" -Recurse -ErrorAction Stop
          foreach ($f in $exeFiles) {
            $sizeMB = [math]::Round($f.Length / 1MB, 2)
            Write-Host "Installer: $($f.Name) ($sizeMB MB)"
            if ($f.Length -lt 1048576) {
              Write-Host "WARNING: Installer kleiner als 1MB — WebView2 fehlt möglicherweise!"
            } else {
              Write-Host "✓ Installer-Größe OK (WebView2 Bootstrapper eingebettet)"
            }
          }

      - name: NSIS Installer hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: |
            target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  #  Windows – Dev .exe  (Debug-Build + Konsolenfenster sichtbar)
  # ─────────────────────────────────────────────────────────────
  build-windows-dev:
    name: Windows Dev-EXE (Konsole sichtbar)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: windows-dev

      - name: Tauri CLI installieren
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri.conf.json patchen – Dev-Identifier
        shell: pwsh
        run: |
          $conf = Get-Content "tauri.conf.json" -Raw | ConvertFrom-Json
          # Produktname anpassen damit es sich vom Release unterscheidet
          $conf.productName = "Lion Launcher Dev"
          $conf | ConvertTo-Json -Depth 20 | Set-Content "tauri.conf.json"
          Write-Host "✓ tauri.conf.json gepatcht (productName=Lion Launcher Dev)"

      - name: Windows Dev-Build (Debug + Konsole via RUSTFLAGS)
        run: cargo tauri build --debug
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          RUST_LOG: "debug"
          # /SUBSYSTEM:CONSOLE überschreibt das standard Windows-Subsystem →
          # beim Start öffnet sich automatisch ein Konsolenfenster mit allen Logs
          RUSTFLAGS: "-C link-arg=/SUBSYSTEM:CONSOLE"

      - name: Dev-EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-dev-exe
          path: |
            target/debug/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  #  Linux – .deb + .rpm
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux Pakete (deb + rpm)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Tauri CLI installieren
        run: cargo install tauri-cli --version "^2" --locked

      - name: Linux-Build (.deb + .rpm)
        run: cargo tauri build
        env:
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"

      - name: .deb Paket hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: .rpm Paket hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  #  GitHub Release erstellen (nur bei Tags)
  # ─────────────────────────────────────────────────────────────
  create-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-windows-dev, build-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Windows Dev-EXE herunterladen
        uses: actions/download-artifact@v4
        with:
          name: windows-dev-exe
          path: release-artifacts/windows-dev
        continue-on-error: true

      - name: Windows Installer herunterladen
        uses: actions/download-artifact@v4
        with:
          name: windows-nsis-installer
          path: release-artifacts/windows

      - name: Linux .deb herunterladen
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release-artifacts/linux
        continue-on-error: true

      - name: Linux .rpm herunterladen
        uses: actions/download-artifact@v4
        with:
          name: linux-rpm
          path: release-artifacts/linux
        continue-on-error: true

      - name: SHA256 Checksums erstellen
        run: |
          cd release-artifacts
          find . -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.rpm" \) \
            -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: GitHub Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          name: "Lion Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            ## 🦁 Lion Launcher ${{ github.ref_name }}

            ### Downloads

            | Plattform | Paket |
            |-----------|-------|
            | Windows   | `Lion Launcher_*_x64-setup.exe` – NSIS Installer (enthält WebView2) |
            | Windows   | `Lion Launcher Dev_*_x64-setup.exe` – Dev-Build (Konsolenfenster sichtbar) |
            | Linux     | `lion-launcher_*.deb` – Debian/Ubuntu |
            | Linux     | `lion-launcher-*.rpm` – Fedora/openSUSE |

            ### Windows Installation
            Lade `*-setup.exe` herunter und führe ihn aus.
            WebView2 wird automatisch installiert, falls nicht vorhanden.

            ### Linux Installation
            **Debian/Ubuntu:** `sudo dpkg -i lion-launcher_*.deb`
            **Fedora:** `sudo dnf install lion-launcher-*.rpm`

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/SHA256SUMS.txt

