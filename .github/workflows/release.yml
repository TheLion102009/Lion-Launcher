name: 🦁 Release Build

on:
  # Jeder Push auf main/master löst einen Build aus
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  # Pull Requests gegen main/master auch bauen (kein Release-Job)
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. 0.1.0)'
        required: false
        default: '0.1.0'

env:
  WEBKIT_DISABLE_DMABUF_RENDERER: 1
  WEBKIT_DISABLE_COMPOSITING_MODE: 1
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────
#  Job 1: Debian (.deb) + RPM (.rpm)  →  ubuntu-24.04
# ─────────────────────────────────────────────────────────────
jobs:
  build-deb-rpm:
    name: 📦 Linux – .deb & .rpm
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System-Abhängigkeiten (Ubuntu/Debian)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            curl wget file rpm \
            fakeroot dpkg-dev

      - name: Rust Toolchain einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: deb-rpm

      - name: Tauri CLI installieren
        run: cargo install tauri-cli --version "^2" --locked

      - name: 🔨 Build .deb + .rpm
        run: cargo tauri build --bundles deb,rpm

      - name: Pakete sammeln
        run: |
          mkdir -p dist
          find target/release/bundle -name "*.deb" -exec cp {} dist/ \;
          find target/release/bundle -name "*.rpm" -exec cp {} dist/ \;
          ls -lh dist/

      - name: SHA256 Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: linux-checksums
          path: dist/SHA256SUMS.txt

# ─────────────────────────────────────────────────────────────
#  Job 2: AppImage (.AppImage)
# ─────────────────────────────────────────────────────────────
  build-appimage:
    name: 📦 Linux – AppImage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System-Abhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf curl wget file \
            squashfs-tools

      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: appimage

      - name: Tauri CLI installieren
        run: cargo install tauri-cli --version "^2" --locked

      - name: 🔨 Build AppImage
        run: cargo tauri build --bundles appimage

      - name: AppImage sammeln
        run: |
          mkdir -p dist
          find target/release/bundle -name "*.AppImage" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────
#  Job 3: Snap (.snap)  →  ubuntu-24.04 + snapcraft --destructive-mode
#
#  FIX: snapcore/action-build@v1 schlug wegen snapd/sudo-Problemen fehl.
#       Lösung: snapd manuell starten → snapcraft installieren →
#               snapcraft --destructive-mode (kein Container/LXD nötig).
#       build-snaps aus snapcraft.yaml werden in --destructive-mode
#       ignoriert; Rust kommt vom Host (dtolnay/rust-toolchain@stable).
# ─────────────────────────────────────────────────────────────
  build-snap:
    name: 📦 Linux – .snap
    runs-on: ubuntu-24.04
    # Wenn Snap fehlschlägt, blockiert es trotzdem nicht den Release-Job
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: snap

      - name: System-Abhängigkeiten (für destructive-mode Build auf dem Host)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf curl wget file

      - name: Snapd initialisieren & Snapcraft installieren
        run: |
          # snapd-Socket aktivieren (auf GH-Actions-Runnern oft noch nicht gestartet)
          sudo systemctl enable --now snapd.socket 2>/dev/null || true
          sudo ln -sf /var/lib/snapd/snap /snap 2>/dev/null || true

          # Warten bis snap bereit ist (max. 90 s)
          echo "Warte auf snapd..."
          timeout 90 sh -c '
            until sudo snap version 2>/dev/null; do
              echo "  snapd noch nicht bereit, warte 5 s..."
              sleep 5
            done
          '
          sudo snap install snapcraft --classic

      - name: 🔨 Snap bauen (destructive-mode)
        # snapcraft braucht Superuser-Rechte um build-packages zu installieren.
        # PATH + HOME beibehalten damit cargo (von dtolnay/rust-toolchain) erreichbar ist.
        run: |
          sudo env \
            PATH="$PATH" \
            HOME="$HOME" \
            SNAPCRAFT_BUILD_ENVIRONMENT=host \
            snapcraft --destructive-mode

      - name: Snap sammeln
        run: |
          mkdir -p dist
          find . -maxdepth 1 -name "*.snap" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload .snap
        uses: actions/upload-artifact@v4
        with:
          name: linux-snap
          path: dist/*.snap
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────
#  Job 4: Flatpak (.flatpak + .flatpakref)  →  ubuntu-24.04
#
#  FIX: GNOME-SDK 46 + Rust-Extension Installation schlug in CI fehl.
#       Das || true versteckte den Fehler, anschließend scheiterte flatpak-builder.
#
#       Neue Strategie:
#       1. Binary mit cargo vorbauen (kein Rust-SDK in Flatpak nötig)
#       2. Binary + Assets ins flatpak/-Verzeichnis kopieren
#       3. CI-Manifest: com.lionlauncher.dev.ci.yml
#          (org.freedesktop.Platform/Sdk//23.08 – kleiner, stabiler in CI)
#       4. bilelmoussaoui/flatpak-github-actions übernimmt SDK-Installation
#          korrekt (kein versteckter Fehler mehr)
# ─────────────────────────────────────────────────────────────
  build-flatpak:
    name: 📦 Linux – Flatpak
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: flatpak

      - name: Build-Abhängigkeiten + Flatpak-Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf curl wget file \
            flatpak flatpak-builder

      - name: Flatpak SDKs installieren (org.freedesktop.Platform/Sdk//23.08)
        # OHNE || true: Fehler sind sofort sichtbar
        run: |
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08

      - name: 🔨 Release-Binary bauen (vor Flatpak-Packaging)
        run: cargo build --release --locked

      - name: Vorgebautes Binary + Assets ins flatpak/-Verzeichnis kopieren
        # Das CI-Manifest referenziert alle Dateien relativ zu flatpak/
        run: |
          cp target/release/Lion-Launcher  flatpak/lion-launcher
          cp icons/32x32.png               flatpak/icon-32.png
          cp icons/128x128.png             flatpak/icon-128.png
          cp icons/icon.png                flatpak/icon-256.png
          ls -lh flatpak/

      - name: 🔨 Flatpak bauen
        # --disable-rofiles-fuse: FUSE nicht verfügbar auf GH-Actions-Runnern
        run: |
          flatpak-builder \
            --repo=flatpak-repo \
            --force-clean \
            --disable-rofiles-fuse \
            flatpak-build \
            flatpak/com.lionlauncher.dev.ci.yml

      - name: Flatpak Bundle (.flatpak) erstellen
        run: |
          mkdir -p dist
          flatpak build-bundle \
            flatpak-repo \
            dist/lion-launcher.flatpak \
            com.lionlauncher.dev
          ls -lh dist/

      - name: .flatpakref Datei erstellen
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          cat > dist/lion-launcher.flatpakref << EOF
          [Flatpak Ref]
          Name=com.lionlauncher.dev
          Branch=stable
          Title=Lion Launcher
          Comment=Ein moderner Minecraft Launcher
          Url=https://dl.flathub.org/repo/
          Homepage=${REPO_URL}
          Icon=${REPO_URL}/raw/main/icons/icon.png
          IsRuntime=false
          SuggestRemoteName=flathub
          EOF
          cat dist/lion-launcher.flatpakref

      - name: Upload .flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: dist/lion-launcher.flatpak
          if-no-files-found: warn

      - name: Upload .flatpakref
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpakref
          path: dist/lion-launcher.flatpakref
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────
#  Job 5: Arch Linux – PKGBUILD + .pkg.tar.zst
#          läuft in archlinux:latest Docker-Container
#
#  FIX 1: Swatinem/rust-cache entfernt (kein rustup im Arch-Container)
#  FIX 2: Rust via pacman installiert (kein rustup erforderlich)
#  FIX 3: Binary + Assets nach /tmp/pkgbuild-ws/ kopiert
#          → PKGBUILD referenziert sie als lokale Quellen via $srcdir
#  FIX 4: PKGBUILD-Heredoc mit 'PKGEOF' (literal) → $srcdir/$pkgdir bleiben erhalten
#          sed substituiert danach VERSION und REPO
#  FIX 5: makepkg --nodeps --skipinteg (Deps bereits installiert)
# ─────────────────────────────────────────────────────────────
  build-arch:
    name: 📦 Arch Linux – PKGBUILD + pkg.tar.zst
    runs-on: ubuntu-24.04
    continue-on-error: true
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Pacman initialisieren & Systemupdate
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Build-Abhängigkeiten installieren
        run: |
          pacman -S --noconfirm --needed \
            base-devel rust cargo git \
            webkit2gtk-4.1 gtk3 libappindicator-gtk3 \
            librsvg pkgconf openssl libsoup3 \
            curl wget file

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build-User anlegen (makepkg läuft nicht als root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: 🔨 Release-Binary bauen
        run: |
          su builder -c "
            export WEBKIT_DISABLE_DMABUF_RENDERER=1
            export WEBKIT_DISABLE_COMPOSITING_MODE=1
            export RUST_BACKTRACE=1
            cargo build --release --locked
          "

      - name: Version ermitteln
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] && VERSION="0.1.0"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Ermittelte Version: $VERSION"

      - name: PKGBUILD-Workspace vorbereiten
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          mkdir -p /tmp/pkgbuild-ws /tmp/pkgbuild-out

          # Vorgebautes Binary + Assets kopieren
          cp target/release/Lion-Launcher /tmp/pkgbuild-ws/lion-launcher-bin
          cp icons/32x32.png               /tmp/pkgbuild-ws/icon-32.png
          cp icons/128x128.png             /tmp/pkgbuild-ws/icon-128.png
          cp icons/icon.png                /tmp/pkgbuild-ws/icon-256.png
          [ -f LICENSE ]   && cp LICENSE   /tmp/pkgbuild-ws/ || true
          [ -f README.md ] && cp README.md /tmp/pkgbuild-ws/ || true

          # Desktop-Eintrag als separate Quelldatei
          cat > /tmp/pkgbuild-ws/lion-launcher.desktop << 'DESKTOP_EOF'
          [Desktop Entry]
          Name=Lion Launcher
          Comment=Ein moderner Minecraft Launcher
          Exec=/usr/bin/lion-launcher
          Icon=lion-launcher
          Type=Application
          Categories=Game;
          Keywords=minecraft;launcher;mods;fabric;forge;neoforge;quilt;
          StartupNotify=true
          StartupWMClass=lion-launcher
          DESKTOP_EOF

          # PKGBUILD mit literal Heredoc schreiben ('PKGEOF' → keine Expansion)
          # $srcdir / $pkgdir / $startdir bleiben als echte makepkg-Variablen erhalten.
          cat > /tmp/pkgbuild-ws/PKGBUILD << 'PKGEOF'
          pkgname=lion-launcher
          pkgver=VERSION_PLACEHOLDER
          pkgrel=1
          pkgdesc="Ein moderner Minecraft Launcher mit Fabric, Quilt, Forge und NeoForge-Support"
          arch=('x86_64')
          url="https://github.com/REPO_PLACEHOLDER"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'libappindicator-gtk3' 'librsvg' 'openssl')
          optdepends=(
              'jdk17-openjdk: Minecraft 1.17+'
              'jdk21-openjdk: Minecraft 1.21+'
          )
          # Lokale Quelldateien – makepkg findet sie neben dem PKGBUILD ($startdir)
          source=(
              'lion-launcher-bin'
              'icon-32.png'
              'icon-128.png'
              'icon-256.png'
              'lion-launcher.desktop'
          )
          sha256sums=('SKIP' 'SKIP' 'SKIP' 'SKIP' 'SKIP')
          noextract=('lion-launcher-bin' 'icon-32.png' 'icon-128.png' 'icon-256.png' 'lion-launcher.desktop')

          build() {
              # Binary ist bereits vorgebaut
              true
          }

          package() {
              install -Dm755 "$srcdir/lion-launcher-bin" \
                  "$pkgdir/usr/bin/lion-launcher"
              install -Dm644 "$srcdir/icon-32.png" \
                  "$pkgdir/usr/share/icons/hicolor/32x32/apps/lion-launcher.png"
              install -Dm644 "$srcdir/icon-128.png" \
                  "$pkgdir/usr/share/icons/hicolor/128x128/apps/lion-launcher.png"
              install -Dm644 "$srcdir/icon-256.png" \
                  "$pkgdir/usr/share/icons/hicolor/256x256/apps/lion-launcher.png"
              install -Dm644 "$srcdir/lion-launcher.desktop" \
                  "$pkgdir/usr/share/applications/lion-launcher.desktop"
              [ -f "$startdir/LICENSE" ] && \
                  install -Dm644 "$startdir/LICENSE" \
                      "$pkgdir/usr/share/licenses/lion-launcher/LICENSE" || true
              [ -f "$startdir/README.md" ] && \
                  install -Dm644 "$startdir/README.md" \
                      "$pkgdir/usr/share/doc/lion-launcher/README.md" || true
          }
          PKGEOF

          # Platzhalter durch echte Werte ersetzen
          sed -i \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|REPO_PLACEHOLDER|${REPO}|g" \
            /tmp/pkgbuild-ws/PKGBUILD

          echo "=== Generiertes PKGBUILD ==="
          cat /tmp/pkgbuild-ws/PKGBUILD

          chown -R builder:builder /tmp/pkgbuild-ws /tmp/pkgbuild-out

      - name: makepkg ausführen
        run: |
          su builder -c "
            cd /tmp/pkgbuild-ws
            PKGDEST=/tmp/pkgbuild-out \
              makepkg -f --noconfirm --noprogressbar --nodeps --skipinteg
          "
          echo "=== Erstellte Pakete ==="
          ls -lh /tmp/pkgbuild-out/

      - name: Pakete sammeln
        run: |
          mkdir -p dist
          find /tmp/pkgbuild-out -name "*.pkg.tar.zst" -exec cp {} dist/ \;
          # AUR-PKGBUILD-Template (aus pkg/) mitliefern
          cp pkg/PKGBUILD dist/PKGBUILD
          echo "=== dist/ ==="
          ls -lh dist/

      - name: Upload .pkg.tar.zst + PKGBUILD
        uses: actions/upload-artifact@v4
        with:
          name: arch-pkg
          path: |
            dist/*.pkg.tar.zst
            dist/PKGBUILD
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────
#  Job 6: Windows – NSIS .exe Installer
# ─────────────────────────────────────────────────────────────
  build-windows:
    name: "🪟 Windows – NSIS .exe"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows
      - name: Tauri CLI installieren
        run: cargo install tauri-cli --version "^2" --locked
      - name: "🔨 Windows-Build (NSIS .exe)"
        run: cargo tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
      - name: WebView2-Bootstrapper verifizieren
        shell: pwsh
        run: |
          $conf = Get-Content "tauri.conf.json" | ConvertFrom-Json
          $mode = $conf.bundle.windows.webviewInstallMode.type
          Write-Host "WebView install mode: $mode"
          if ($mode -ne "embedBootstrapper") {
            Write-Host "ERROR: webviewInstallMode ist nicht embedBootstrapper!"; exit 1
          }
          Write-Host "OK embedBootstrapper konfiguriert"
          $nsisDir = "target\release\bundle\nsis"
          Get-ChildItem -Path $nsisDir -Filter "*.exe" -Recurse | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "Installer: $($_.Name) ($sizeMB MB)"
          }
      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────
#  Job 7: Nightly – Dateien direkt auf den LionCraft-Server
#          hochladen und im Backend registrieren.
#          (läuft nur bei Push auf main/master, NICHT bei Tag-Pushes)
#
#  Benötigt GitHub-Secrets:
#    LAUNCHER_WEBHOOK_SECRET  – muss mit [launcher] webhook_secret
#                               in config.toml übereinstimmen
# ─────────────────────────────────────────────────────────────
  release-nightly:
    name: "🌙 Nightly – Upload & Backend registrieren"
    needs:
      - build-deb-rpm
      - build-appimage
      - build-windows
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Alle Build-Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Artefakte auflisten
        run: find artifacts -type f | sort

      - name: 📡 Dateien hochladen & im Backend registrieren (Nightly)
        continue-on-error: true
        run: |
          if [ -z "$LAUNCHER_WEBHOOK_SECRET" ]; then
            echo "⚠️  LAUNCHER_WEBHOOK_SECRET nicht gesetzt – übersprungen."
            echo "   Tipp: Unter Settings → Secrets → LAUNCHER_WEBHOOK_SECRET eintragen."
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          API="https://api.lion-craft.net"
          AUTH_HEADER="X-Webhook-Token: $LAUNCHER_WEBHOOK_SECRET"

          # ── Hilfsfunktion: Datei hochladen + Release registrieren ──────────
          upload_and_register() {
            local PLATFORM="$1"
            local FORMAT="$2"
            local FILE="$3"
            local FILENAME
            FILENAME=$(basename "$FILE")

            echo ""
            echo "═══════════════════════════════════════════"
            echo "📤 Upload: $FILENAME"
            echo "   Platform=$PLATFORM  Format=$FORMAT  Version=$SHORT_SHA"

            # 1. Datei auf den Server hochladen
            HTTP_CODE=$(curl -s \
              --max-time 300 \
              -o /tmp/upload_resp.json \
              -w "%{http_code}" \
              -X POST "$API/api/launcher/upload" \
              -H "$AUTH_HEADER" \
              -F "file=@$FILE" \
              -F "platform=$PLATFORM" \
              -F "format=$FORMAT" \
              -F "channel=nightly" \
              -F "version=$SHORT_SHA" \
              -F "git_sha=$GITHUB_SHA")

            if [ "$HTTP_CODE" != "201" ]; then
              echo "   ❌ Upload fehlgeschlagen (HTTP $HTTP_CODE)"
              cat /tmp/upload_resp.json
              return 1
            fi

            DOWNLOAD_URL=$(jq -r '.download_url' /tmp/upload_resp.json)
            FILE_SIZE=$(jq -r '.file_size'    /tmp/upload_resp.json)
            echo "   ✅ Hochgeladen ($FILE_SIZE)"
            echo "   🔗 $DOWNLOAD_URL"

            # 2. Release in MongoDB eintragen
            REG_CODE=$(curl -s \
              -o /tmp/reg_resp.json \
              -w "%{http_code}" \
              -X POST "$API/api/launcher/releases" \
              -H "Content-Type: application/json" \
              -H "$AUTH_HEADER" \
              -d "{
                \"channel\":      \"nightly\",
                \"platform\":     \"$PLATFORM\",
                \"format\":       \"$FORMAT\",
                \"version\":      \"$SHORT_SHA\",
                \"download_url\": \"$DOWNLOAD_URL\",
                \"file_size\":    \"$FILE_SIZE\",
                \"git_sha\":      \"$GITHUB_SHA\"
              }")

            if [ "$REG_CODE" = "201" ]; then
              echo "   ✅ In DB registriert (HTTP $REG_CODE)"
            else
              echo "   ⚠️  DB-Registrierung (HTTP $REG_CODE): $(cat /tmp/reg_resp.json)"
            fi
          }

          # ── Formate verarbeiten ───────────────────────────────────────────
          for f in artifacts/linux-deb/*.deb;           do [ -f "$f" ] && upload_and_register "linux"   "deb"       "$f"; done
          for f in artifacts/linux-rpm/*.rpm;           do [ -f "$f" ] && upload_and_register "linux"   "rpm"       "$f"; done
          for f in artifacts/linux-appimage/*.AppImage; do [ -f "$f" ] && upload_and_register "linux"   "AppImage"  "$f"; done
          for f in artifacts/windows-installer/*.exe;   do [ -f "$f" ] && upload_and_register "windows" "exe"       "$f"; done

          echo ""
          echo "✅ Alle Nightly-Releases hochgeladen und registriert"
        env:
          LAUNCHER_WEBHOOK_SECRET: ${{ secrets.LAUNCHER_WEBHOOK_SECRET }}

# ─────────────────────────────────────────────────────────────
#  Job 7: Nightly – GitHub Pre-Release erstellen & Backend
#          benachrichtigen (läuft nur bei Push auf main/master,
#          NICHT bei Tag-Pushes)
#
#  Benötigt GitHub-Secrets:
#    LAUNCHER_WEBHOOK_SECRET  – muss mit [launcher] webhook_secret
#                               in config.toml übereinstimmen
# ─────────────────────────────────────────────────────────────
  release-nightly:
    name: "🌙 Nightly – GitHub Release & Backend"
    needs:
      - build-deb-rpm
      - build-appimage
      - build-windows
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Alle Build-Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Artefakte auflisten
        run: find artifacts -type f | sort

      - name: Alte "nightly" Release + Tag löschen (falls vorhanden)
        run: |
          gh release delete nightly --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh api -X DELETE "/repos/$GITHUB_REPOSITORY/git/refs/tags/nightly" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Nightly GitHub-Release erstellen & Artefakte hochladen
        id: nightly_release
        run: |
          FILES=()
          for f in \
            artifacts/linux-deb/*.deb \
            artifacts/linux-rpm/*.rpm \
            artifacts/linux-appimage/*.AppImage \
            artifacts/windows-installer/*.exe; do
            [ -f "$f" ] && FILES+=("$f")
          done

          echo "📦 Lade folgende Dateien hoch:"
          printf '   %s\n' "${FILES[@]}"

          gh release create nightly \
            --target "${GITHUB_SHA}" \
            --title "🌙 Nightly – $(date -u +'%Y-%m-%d') (${GITHUB_SHA:0:7})" \
            --notes "$(printf '**Automatischer Nightly-Build**\n\n- Commit: `%s`\n- Kurzform: `%s`\n- Branch: `%s`\n- Datum: %s\n\n> ⚠️ Dieser Release wird bei jedem Push auf `main` automatisch überschrieben.' \
              "$GITHUB_SHA" \
              "${GITHUB_SHA:0:7}" \
              "${{ github.ref_name }}" \
              "$(date -u +'%Y-%m-%dT%H:%M:%SZ')")" \
            --prerelease \
            --repo "$GITHUB_REPOSITORY" \
            "${FILES[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📡 Backend-API – Nightly Releases registrieren
        continue-on-error: true
        run: |
          if [ -z "$LAUNCHER_WEBHOOK_SECRET" ]; then
            echo "⚠️  LAUNCHER_WEBHOOK_SECRET nicht gesetzt – Backend-Benachrichtigung übersprungen."
            echo "   Tipp: Unter Settings → Secrets → LAUNCHER_WEBHOOK_SECRET eintragen."
            exit 0
          fi

          REPO="${{ github.repository }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BASE_URL="https://github.com/${REPO}/releases/download/nightly"

          post_release() {
            local PLATFORM="$1" FORMAT="$2" FILE="$3"
            local FILENAME SIZE
            FILENAME=$(basename "$FILE")
            SIZE=$(du -sh "$FILE" 2>/dev/null | awk '{print $1}')

            echo "📤 Registriere: channel=nightly platform=$PLATFORM format=$FORMAT version=$SHORT_SHA"
            echo "   Datei: $FILENAME  |  Größe: $SIZE"
            echo "   URL:   ${BASE_URL}/${FILENAME}"

            HTTP_CODE=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
              -X POST "https://api.lion-craft.net/api/launcher/releases" \
              -H "X-Webhook-Token: $LAUNCHER_WEBHOOK_SECRET" \
              -H "Content-Type: application/json" \
              -d "{
                \"channel\": \"nightly\",
                \"platform\": \"$PLATFORM\",
                \"format\": \"$FORMAT\",
                \"version\": \"$SHORT_SHA\",
                \"download_url\": \"${BASE_URL}/${FILENAME}\",
                \"file_size\": \"$SIZE\",
                \"git_sha\": \"$GITHUB_SHA\"
              }")

            if [ "$HTTP_CODE" = "201" ]; then
              echo "   ✅ HTTP $HTTP_CODE – Erfolgreich registriert"
            else
              echo "   ⚠️  HTTP $HTTP_CODE – Antwort: $(cat /tmp/api_resp.json)"
            fi
            echo ""
          }

          # Linux .deb
          for f in artifacts/linux-deb/*.deb; do
            [ -f "$f" ] && post_release "linux" "deb" "$f"
          done

          # Linux .rpm
          for f in artifacts/linux-rpm/*.rpm; do
            [ -f "$f" ] && post_release "linux" "rpm" "$f"
          done

          # Linux AppImage
          for f in artifacts/linux-appimage/*.AppImage; do
            [ -f "$f" ] && post_release "linux" "AppImage" "$f"
          done

          # Windows .exe
          for f in artifacts/windows-installer/*.exe; do
            [ -f "$f" ] && post_release "windows" "exe" "$f"
          done

          echo "✅ Alle Nightly-Releases im Backend registriert"
        env:
          LAUNCHER_WEBHOOK_SECRET: ${{ secrets.LAUNCHER_WEBHOOK_SECRET }}

# ─────────────────────────────────────────────────────────────
#  GitHub Release – alle Pakete zusammenführen
#  Snap/Flatpak/Arch haben continue-on-error: true →
#  Release wird auch erstellt wenn einzelne Jobs fehlschlagen.
# ─────────────────────────────────────────────────────────────
  create-release:
    name: "🚀 GitHub Release erstellen"
    runs-on: ubuntu-24.04
    needs:
      - build-deb-rpm
      - build-appimage
      - build-snap
      - build-flatpak
      - build-arch
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Alle Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Artefakte auflisten
        run: find release-artifacts -type f | sort
      - name: SHA256 Gesamtchecksums erstellen
        run: |
          cd release-artifacts
          find . -type f ! -name "SHA256SUMS*" ! -name "PKGBUILD" ! -name "*.flatpakref" \
            | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Version extrahieren
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: GitHub Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          name: "Lion Launcher ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
          body: |
            ## 🦁 Lion Launcher ${{ steps.version.outputs.tag }}
            ### 📦 Verfügbare Pakete
            | Format | Plattform | Installationsbefehl |
            |--------|-----------|---------------------|
            | `.deb` | Debian, Ubuntu, Mint, Pop!_OS | `sudo dpkg -i lion-launcher_*.deb` |
            | `.rpm` | Fedora, RHEL, CentOS, openSUSE | `sudo rpm -i lion-launcher-*.rpm` |
            | `.AppImage` | Alle Linux-Distros | `chmod +x && ./lion-launcher_*.AppImage` |
            | `.snap` | Ubuntu + Snap-kompatible Distros | `sudo snap install *.snap --dangerous` |
            | `.flatpak` | Alle Linux-Distros (Flatpak) | `flatpak install lion-launcher.flatpak` |
            | `.flatpakref` | Direktinstallation | `flatpak install lion-launcher.flatpakref` |
            | `PKGBUILD` | Arch Linux, Manjaro, EndeavourOS | `makepkg -si` |
            | `.pkg.tar.zst` | Arch Linux (prebuilt) | `sudo pacman -U *.pkg.tar.zst` |
            | `.exe` | Windows 10/11 | NSIS-Installer, WebView2 eingebettet |
            ### 🐧 Arch Linux
            ```bash
            # Aus PKGBUILD bauen (AUR-kompatibel):
            curl -O .../PKGBUILD && makepkg -si
            # Oder Prebuilt:
            sudo pacman -U lion-launcher-${{ steps.version.outputs.version }}-1-x86_64.pkg.tar.zst
            ```
            ### ✅ Checksums
            Alle SHA-256 Checksums in `SHA256SUMS.txt`.
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.snap
            release-artifacts/**/*.flatpak
            release-artifacts/**/*.flatpakref
            release-artifacts/**/*.pkg.tar.zst
            release-artifacts/**/PKGBUILD
            release-artifacts/**/*.exe
            release-artifacts/SHA256SUMS.txt
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📡 Backend-API – Stable Release registrieren
        continue-on-error: true
        run: |
          # LAUNCHER_ADMIN_JWT wird als GitHub Secret gespeichert.
          # Der Admin loggt sich ein (POST /api/auth/login), kopiert den JWT
          # und hinterlegt ihn unter Settings → Secrets → LAUNCHER_ADMIN_JWT.
          # Standard-Ablaufzeit: 24h – für CI empfiehlt sich ein längerer Wert
          # (expiry_hours in config.toml auf z.B. 8760 = 1 Jahr setzen).
          if [ -z "$LAUNCHER_ADMIN_JWT" ]; then
            echo "⚠️  LAUNCHER_ADMIN_JWT nicht gesetzt – Stable-Backend-Benachrichtigung übersprungen."
            echo "   Tipp: Unter Settings → Secrets → LAUNCHER_ADMIN_JWT eintragen."
            exit 0
          fi

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          post_stable() {
            local PLATFORM="$1" FORMAT="$2" FILE="$3"
            local FILENAME SIZE
            FILENAME=$(basename "$FILE")
            SIZE=$(du -sh "$FILE" 2>/dev/null | awk '{print $1}')

            echo "📤 Registriere: channel=stable platform=$PLATFORM format=$FORMAT version=$VERSION"
            echo "   Datei: $FILENAME  |  Größe: $SIZE"
            echo "   URL:   ${BASE_URL}/${FILENAME}"

            HTTP_CODE=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
              -X POST "https://api.lion-craft.net/api/launcher/releases" \
              -H "Authorization: Bearer $LAUNCHER_ADMIN_JWT" \
              -H "Content-Type: application/json" \
              -d "{
                \"channel\": \"stable\",
                \"platform\": \"$PLATFORM\",
                \"format\": \"$FORMAT\",
                \"version\": \"$VERSION\",
                \"download_url\": \"${BASE_URL}/${FILENAME}\",
                \"file_size\": \"$SIZE\",
                \"git_sha\": \"$GITHUB_SHA\"
              }")

            if [ "$HTTP_CODE" = "201" ]; then
              echo "   ✅ HTTP $HTTP_CODE – Erfolgreich registriert"
            else
              echo "   ⚠️  HTTP $HTTP_CODE – Antwort: $(cat /tmp/api_resp.json)"
            fi
            echo ""
          }

          for f in release-artifacts/linux-deb/*.deb; do
            [ -f "$f" ] && post_stable "linux" "deb" "$f"
          done
          for f in release-artifacts/linux-rpm/*.rpm; do
            [ -f "$f" ] && post_stable "linux" "rpm" "$f"
          done
          for f in release-artifacts/linux-appimage/*.AppImage; do
            [ -f "$f" ] && post_stable "linux" "AppImage" "$f"
          done
          for f in release-artifacts/windows-installer/*.exe; do
            [ -f "$f" ] && post_stable "windows" "exe" "$f"
          done

          echo "✅ Alle Stable-Releases im Backend registriert"
        env:
          LAUNCHER_ADMIN_JWT: ${{ secrets.LAUNCHER_ADMIN_JWT }}

      - name: 📡 Backend-API – Stable Release registrieren
        continue-on-error: true
        run: |
          # LAUNCHER_ADMIN_JWT wird als GitHub Secret gespeichert.
          # Der Admin loggt sich ein (POST /api/auth/login), kopiert den JWT
          # und hinterlegt ihn unter Settings → Secrets → LAUNCHER_ADMIN_JWT.
          # Standard-Ablaufzeit: 24h – für CI empfiehlt sich ein längerer Wert
          # (expiry_hours in config.toml auf z.B. 8760 = 1 Jahr setzen).
          if [ -z "$LAUNCHER_ADMIN_JWT" ]; then
            echo "⚠️  LAUNCHER_ADMIN_JWT nicht gesetzt – Stable-Backend-Benachrichtigung übersprungen."
            echo "   Tipp: Unter Settings → Secrets → LAUNCHER_ADMIN_JWT eintragen."
            exit 0
          fi

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          post_stable() {
            local PLATFORM="$1" FORMAT="$2" FILE="$3"
            local FILENAME SIZE
            FILENAME=$(basename "$FILE")
            SIZE=$(du -sh "$FILE" 2>/dev/null | awk '{print $1}')

            echo "📤 Registriere: channel=stable platform=$PLATFORM format=$FORMAT version=$VERSION"
            echo "   Datei: $FILENAME  |  Größe: $SIZE"
            echo "   URL:   ${BASE_URL}/${FILENAME}"

            HTTP_CODE=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
              -X POST "https://api.lion-craft.net/api/launcher/releases" \
              -H "Authorization: Bearer $LAUNCHER_ADMIN_JWT" \
              -H "Content-Type: application/json" \
              -d "{
                \"channel\": \"stable\",
                \"platform\": \"$PLATFORM\",
                \"format\": \"$FORMAT\",
                \"version\": \"$VERSION\",
                \"download_url\": \"${BASE_URL}/${FILENAME}\",
                \"file_size\": \"$SIZE\",
                \"git_sha\": \"$GITHUB_SHA\"
              }")

            if [ "$HTTP_CODE" = "201" ]; then
              echo "   ✅ HTTP $HTTP_CODE – Erfolgreich registriert"
            else
              echo "   ⚠️  HTTP $HTTP_CODE – Antwort: $(cat /tmp/api_resp.json)"
            fi
            echo ""
          }

          for f in release-artifacts/linux-deb/*.deb; do
            [ -f "$f" ] && post_stable "linux" "deb" "$f"
          done
          for f in release-artifacts/linux-rpm/*.rpm; do
            [ -f "$f" ] && post_stable "linux" "rpm" "$f"
          done
          for f in release-artifacts/linux-appimage/*.AppImage; do
            [ -f "$f" ] && post_stable "linux" "AppImage" "$f"
          done
          for f in release-artifacts/windows-installer/*.exe; do
            [ -f "$f" ] && post_stable "windows" "exe" "$f"
          done

          echo "✅ Alle Stable-Releases im Backend registriert"
        env:
          LAUNCHER_ADMIN_JWT: ${{ secrets.LAUNCHER_ADMIN_JWT }}

